name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: 依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze

      - name: 单元测试
        run: flutter test

      - name: 还原 prod 签名（来自 GitHub Secrets）
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/prod.keystore
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=prod.keystore
          EOF

      - name: 构建 prod AAB（正式签名 / SEO 包名）
        run: flutter build appbundle --release --flavor prod

      - name: 清理签名材料
        if: always()
        run: rm -f android/app/prod.keystore android/key.properties

      - uses: actions/upload-artifact@v4
        with:
          name: sweet-crush-prod-aab
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
